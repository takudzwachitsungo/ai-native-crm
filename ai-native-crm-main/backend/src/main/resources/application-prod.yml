spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

# AI Configuration (Groq API - OpenAI compatible)
openai:
  api-url: https://api.groq.com/openai/v1
  api-key: ${GROQ_API_KEY}
  model: mixtral-8x7b-32768

logging:
  level:
    root: WARN
    com.crm: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoint:
    health:
      show-details: never

server:
  error:
    include-stacktrace: never
    include-message: always
    include-binding-errors: always
