services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: crm-postgres
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - crm-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  minio:
    image: minio/minio:latest
    container_name: crm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-crm_minio_secret}
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: crm-ai-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      crm-backend:
        condition: service_started
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      CRM_API_URL: http://crm-backend:8080
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5175}
      CRM_API_USERNAME: ${CRM_API_USERNAME:-admin@crm.com}
      CRM_API_PASSWORD: ${CRM_API_PASSWORD:-admin123}
      DATABASE_URL: postgresql://crm_user:crm_pass@postgres:5432/crm_db
      REDIS_URL: redis://redis:6379/1
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      CHAT_MODEL: llama-3.3-70b-versatile
      TEMPERATURE: 0.7
      MAX_TOKENS: 2048
      EMBEDDING_DIMENSIONS: 384
      SIMILARITY_THRESHOLD: 0.7
      TOP_K_RESULTS: 5
      AI_RAG_SCHEDULER_ENABLED: ${AI_RAG_SCHEDULER_ENABLED:-false}
      AI_RAG_SCHEDULER_AUTH_MODE: ${AI_RAG_SCHEDULER_AUTH_MODE:-jwt}
      AI_RAG_SCHEDULER_ACCESS_TOKEN: ${AI_RAG_SCHEDULER_ACCESS_TOKEN:-}
      AI_RAG_SCHEDULER_TOKEN_EXPIRES_AT: ${AI_RAG_SCHEDULER_TOKEN_EXPIRES_AT:-}
      AI_RAG_SCHEDULER_TOKEN_ROTATION_WARNING_DAYS: ${AI_RAG_SCHEDULER_TOKEN_ROTATION_WARNING_DAYS:-7}
      AI_RAG_SERVICE_ACCOUNT_EMAIL: ${AI_RAG_SERVICE_ACCOUNT_EMAIL:-}
      AI_RAG_SERVICE_ACCOUNT_PASSWORD: ${AI_RAG_SERVICE_ACCOUNT_PASSWORD:-}
      AI_RAG_SERVICE_ACCOUNT_WORKSPACE: ${AI_RAG_SERVICE_ACCOUNT_WORKSPACE:-}
      AI_RAG_SERVICE_ACCOUNT_REFRESH_BUFFER_SECONDS: ${AI_RAG_SERVICE_ACCOUNT_REFRESH_BUFFER_SECONDS:-300}
      AI_RAG_SCHEDULER_INTERVAL_SECONDS: ${AI_RAG_SCHEDULER_INTERVAL_SECONDS:-3600}
      AI_RAG_SCHEDULER_DOMAINS: ${AI_RAG_SCHEDULER_DOMAINS:-documents,emails,cases,tasks}
      AI_RAG_SCHEDULER_LIMIT: ${AI_RAG_SCHEDULER_LIMIT:-100}
      AI_APPROVAL_STORE_PATH: /app/data/ai_action_approvals.json
      RAG_CHUNK_MAX_CHARS: ${RAG_CHUNK_MAX_CHARS:-1800}
      RAG_CHUNK_OVERLAP_CHARS: ${RAG_CHUNK_OVERLAP_CHARS:-180}
      RAG_RECENCY_WEIGHT: ${RAG_RECENCY_WEIGHT:-0.03}
    ports:
      - "8000:8000"
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  crm-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/crm_db
      DATABASE_USERNAME: crm_user
      DATABASE_PASSWORD: crm_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-dGhpc2lzYXZlcnlzZWNyZXRqd3RrZXlmb3J0aGVjcm1hcHBsaWNhdGlvbnRoYXRzaG91bGRiZWNoYW5nZWRpbnByb2R1Y3Rpb24=}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost:5175}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5175}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-minio}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-crm-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-crm_minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-crm_minio_secret}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_CREATE_BUCKET: ${S3_CREATE_BUCKET:-true}
      WEB_PUSH_ENABLED: ${WEB_PUSH_ENABLED:-true}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:notifications@example.com}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - crm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  crm-network:
    driver: bridge
